version: '3.9'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: affiliatehunter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["3001:3001"]
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/affiliatehunter
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3001
      NODE_ENV: development
    env_file: [.env]
    volumes: [./backend:/app, /app/node_modules]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on: [backend]

volumes:
  pgdata:
